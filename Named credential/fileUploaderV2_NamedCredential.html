<!-- fileUploaderV2_NamedCredential.html -->
<template>
    <lightning-card title="File Upload v2 (Named Credential)" icon-name="doctype:attachment">
        <div class="slds-p-around_medium">
            
            <!-- Configuration Status -->
            <div class="slds-box slds-box_x-small slds-theme_default slds-m-bottom_medium">
                <div class="slds-grid slds-grid_align-spread">
                    <div>
                        <p><strong>Named Credential:</strong> 
                            <span class={namedCredStatusClass}>{namedCredStatusText}</span>
                        </p>
                        <p class="slds-text-body_small slds-text-color_weak">
                            {uploadMethodText}
                        </p>
                    </div>
                    <lightning-button-icon
                        icon-name="utility:settings"
                        alternative-text="Show Config"
                        onclick={toggleConfig}>
                    </lightning-button-icon>
                </div>
                
                <template if:true={showConfig}>
                    <div class="slds-m-top_small slds-box slds-theme_shade">
                        <p><strong>Max Single Upload:</strong> {uploadConfig.maxSingleUploadMB} MB</p>
                        <p><strong>Chunk Size:</strong> {uploadConfig.chunkSizeMB} MB</p>
                        <p><strong>API Version:</strong> {uploadConfig.apiVersion}</p>
                        <p><strong>Named Credential:</strong> {uploadConfig.namedCredentialName}</p>
                    </div>
                </template>
            </div>

            <!-- Drag and Drop Zone -->
            <div 
                class="slds-box slds-box_x-small slds-text-align_center slds-m-bottom_medium drop-zone"
                class:is-drag-over={isDragOver}
                ondragover={handleDragOver}
                ondragleave={handleDragLeave}
                ondrop={handleDrop}>
                <lightning-icon icon-name="utility:upload" size="large"></lightning-icon>
                <p class="slds-m-top_small">Drag and drop files here</p>
                <p class="slds-text-color_weak slds-text-body_small">or use the form below</p>
                <div class="slds-m-top_small">
                    <lightning-input
                        type="file"
                        label="Select File"
                        onchange={handleFileSelect}
                        variant="label-hidden">
                    </lightning-input>
                </div>
            </div>

            <!-- File Info -->
            <template if:true={fileSize}>
                <div class="slds-box slds-box_x-small slds-theme_default slds-m-bottom_medium">
                    <p><strong>File:</strong> {fileName}</p>
                    <p><strong>Size:</strong> {fileSize} bytes ({formatSize(fileSize)})</p>
                    <p><strong>Method:</strong> {uploadMethodText}</p>
                </div>
            </template>

            <!-- Input Fields -->
            <lightning-input
                label="Title"
                value={title}
                onchange={handleTitleChange}>
            </lightning-input>

            <lightning-input
                class="slds-m-top_small"
                label="File Name"
                value={fileName}
                onchange={handleFileNameChange}>
            </lightning-input>

            <lightning-input
                class="slds-m-top_small"
                label="MIME Type"
                value={mimeType}
                onchange={handleMimeTypeChange}>
            </lightning-input>

            <lightning-textarea
                class="slds-m-top_small"
                label="Generated File Content (or drop a file above)"
                value={fileBody}
                onchange={handleFileBodyChange}
                rows="6">
            </lightning-textarea>

            <!-- Record Context -->
            <template if:true={recordId}>
                <div class="slds-m-top_small slds-text-color_weak">
                    Record: <code>{recordId}</code>
                </div>
            </template>

            <!-- Upload Button -->
            <div class="slds-m-top_medium">
                <lightning-button
                    label="Upload via Named Credential"
                    variant="brand"
                    onclick={handleUpload}
                    disabled={isUploading}>
                </lightning-button>
            </div>

            <!-- Loading Spinner -->
            <template if:true={isUploading}>
                <div class="slds-m-top_medium">
                    <lightning-spinner alternative-text="Uploading" size="small"></lightning-spinner>
                </div>
            </template>

            <!-- Success Result -->
            <template if:true={uploadResult}>
                <div class="slds-m-top_medium slds-box slds-theme_default">
                    <p><strong>ContentVersion Id:</strong> {uploadResult.contentVersionId}</p>
                    <p><strong>Method Used:</strong> {uploadResult.methodUsed}</p>
                    <template if:true={uploadResult.chunksUploaded}>
                        <p><strong>Chunks:</strong> {uploadResult.chunksUploaded}</p>
                    </template>
                    <template if:true={uploadResult.success}>
                        <p class="slds-text-color_success">✅ Upload succeeded!</p>
                    </template>
                </div>
            </template>

            <!-- Error Message -->
            <template if:true={errorMessage}>
                <div class="slds-m-top_medium slds-box slds-theme_error">
                    <p class="slds-text-color_inverse"><strong>Error:</strong></p>
                    <p class="slds-text-color_inverse">{errorMessage}</p>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
